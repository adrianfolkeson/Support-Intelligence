<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#292524"/>
      <stop offset="100%" style="stop-color:#1c1917"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#gradient)"/>
  <g transform="translate(256, 256)">
    <!-- Shield shape -->
    <path d="M-80-100 L-80-20 Q-80 80 0 120 Q80 80 80-20 L80-100 Z"
          fill="none"
          stroke="white"
          stroke-width="16"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <!-- Brain/AI nodes inside shield -->
    <circle cx="-40" cy="-40" r="12" fill="white"/>
    <circle cx="40" cy="-40" r="12" fill="white"/>
    <circle cx="0" cy="20" r="16" fill="white"/>
    <!-- Connection lines -->
    <line x1="-40" y1="-40" x2="0" y2="20" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <line x1="40" y1="-40" x2="0" y2="20" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <line x1="-40" y1="-40" x2="40" y2="-40" stroke="white" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>