version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: support-intelligence-db
    environment:
      POSTGRES_DB: support_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: support-intelligence-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/support_intelligence
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUPPORT_API_URL: ${SUPPORT_API_URL}
      SUPPORT_API_KEY: ${SUPPORT_API_KEY}
      PORT: 3000
      NODE_ENV: production
      ENABLE_SCHEDULER: "true"
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
