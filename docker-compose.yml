version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: support-intelligence-db
    environment:
      POSTGRES_DB: support_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: support-intelligence-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/support_intelligence
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ZAI_API_KEY: ${ZAI_API_KEY}
      SUPPORT_API_URL: ${SUPPORT_API_URL}
      SUPPORT_API_KEY: ${SUPPORT_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      PORT: ${PORT:-3000}
      API_PORT: ${API_PORT:-3001}
      NODE_ENV: production
      ENABLE_SCHEDULER: "true"
      SCHEDULER_TIMEOUT_MS: ${SCHEDULER_TIMEOUT_MS:-1800000}
      MAX_PARALLEL_ORGS: ${MAX_PARALLEL_ORGS:-5}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: support-intelligence-network
