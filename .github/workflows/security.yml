name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ============================================
  # Dependency Security Scanning
  # ============================================
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm outdated || true

  # ============================================
  # Code Security Scanning
  # ============================================
  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ============================================
  # Secret Scanning
  # ============================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for complete scanning

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ============================================
  # Security Headers Check
  # ============================================
  security-headers:
    name: Security Headers Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check next.config.mjs for security headers
        run: |
          if ! grep -q "Content-Security-Policy" next.config.mjs; then
            echo "❌ Missing Content-Security-Policy header"
            exit 1
          fi
          if ! grep -q "X-Frame-Options" next.config.mjs; then
            echo "❌ Missing X-Frame-Options header"
            exit 1
          fi
          if ! grep -q "X-Content-Type-Options" next.config.mjs; then
            echo "❌ Missing X-Content-Type-Options header"
            exit 1
          fi
          echo "✅ All required security headers are present"

  # ============================================
  # Environment Variables Check
  # ============================================
  env-check:
    name: Environment Variables Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for placeholder values in .env.example
        run: |
          if grep -q "sk-ant-api03-\.\.\." .env.example; then
            echo "❌ .env.example contains insecure placeholder values"
            exit 1
          fi
          if grep -q "sk_test_\.\.\." .env.example; then
            echo "❌ .env.example contains insecure placeholder values"
            exit 1
          fi
          echo "✅ .env.example uses secure placeholder values"

      - name: Check for .env files in git history
        run: |
          if git log --all --full-history --source -- "*.env" "**/*.env" "**/*.env.local" | grep -q "commit"; then
            echo "❌ WARNING: .env files found in git history"
            echo "Please rotate all exposed API keys immediately"
            exit 1
          fi
          echo "✅ No .env files found in git history"

      - name: Verify .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "❌ .env.example file is missing"
            exit 1
          fi
          echo "✅ .env.example file exists"

  # ============================================
  # TypeScript Security Check
  # ============================================
  typescript-security:
    name: TypeScript Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit --pretty || true

      - name: Check for any types
        run: |
          if grep -r "any" app/ lib/ --include="*.ts" --include="*.tsx" | grep -v "// @ts-ignore" | grep -v "// eslint-disable"; then
            echo "⚠️ Warning: Found 'any' types in code"
          fi

  # ============================================
  # Build Security Check
  # ============================================
  build-security:
    name: Build Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi
          echo "✅ Build completed successfully"

  # ============================================
  # License Compliance
  # ============================================
  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npm list --json --depth=0 > package-list.json
          echo "✅ License check completed"

  # ============================================
  # Security Summary
  # ============================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, code-security, secret-scan, security-headers, env-check, typescript-security, build-security]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Check | ${{ needs.dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Security | ${{ needs.code-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Headers | ${{ needs.security-headers.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment Check | ${{ needs.env-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Security | ${{ needs.typescript-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Security | ${{ needs.build-security.result }} |" >> $GITHUB_STEP_SUMMARY
